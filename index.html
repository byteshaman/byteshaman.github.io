<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ByteShaman</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/global.css" />

    <script type="module" src="/src/main.ts"></script>
    <script>
      const season = localStorage.getItem('theme-season');
      const mode = localStorage.getItem('theme-mode');
      if (season) document.documentElement.setAttribute('data-theme', season);
      if (mode) document.documentElement.style.colorScheme = mode;
    </script>
  </head>
  
  <body>
    <!-- NAVBAR -->
    <header>
      <nav>
        <a href="http://github.com/byteshaman" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-github"></i>
          <span>Github</span>
        </a>
      </nav>
      <theme-switcher></theme-switcher>
    </header>

    <main>
      <!-- SECTION 1: Profile -->
      <section class="profile">
        <div>
          <typed-text text="Hello, world! 👋"></typed-text>

          <p>Web Developer from Italy, passionate about IT since I was 1010<sub>2</sub></p>
      
          <p>My motto is: "I live my life one byte at a time"</p>
      
          <p>Between bug fixes, I dive into music, films, and legendary gaming quests!</p>
        </div>
      
        <div class="pfp-wrap">
          <img src="./src/assets/placeholder.svg" alt="Profile picture" class="placeholder" width="100"/>
          <img src="./src/assets/profile-pic.webp" alt="pfp" aria-hidden="true" loading="lazy" class="pfp"  width="100"/>
        </div>
      </section>

      <section class="skills">
        <h2 class="section-title">SKILLS</h2>
        <skill-list></skill-list>
      </section>
    </main>
  </body>
  
</html>
